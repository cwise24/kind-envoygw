---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eg
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ngx-svc
  labels:
    app: nginx
    service: nginx
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 80
  selector:
    app: nginx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - image: nginx:1.29
          imagePullPolicy: IfNotPresent
          name: web
          ports:
            - containerPort: 80
          volumeMounts:
          - name: nginx-conf
            mountPath: /etc/nginx/nginx.conf
            subPath: nginx.conf 
      volumes: 
        - name: nginx-conf 
          configMap:
            name: nginx-conf
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ngx-route
spec:
  parentRefs:
    - name: eg
  hostnames:
    - "www.nginx.com"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: ngx-svc
          port: 8080
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: v1 
kind: ConfigMap
metadata:
  name: nginx-conf
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }
    http {
      server {
        listen 80;
        server_name nginx.com www.nginx.com;
        location / {
          root /usr/share/nginx/html;
          index index.html;
        }
      }
    }